@if (visible) {
    <div class="modal-overlay">
    <div class="modal">

        <h3>Confirmation</h3>

        <p>{{ message }}</p>

        <div class="actions">
        <button (click)="cancel()">Annuler</button>
        <button class="danger" (click)="confirm()">Supprimer</button>
        </div>

    </div>
    </div>
}
