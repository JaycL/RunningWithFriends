<div class="event-card">

  
  <!-- HEADER -->
  <div class="event-header">
    <h2 class="event-title">{{ event.Name }}</h2>

    <div class="event-actions">
      <button matButton="elevated" (click)="modalService.openEdit(event)" >✏️</button>      
      <button (click)="deleteEvent(event)" matFab aria-label="Example icon button with a delete icon">
        <mat-icon>delete</mat-icon>
      </button>

      
      <button [routerLink]="['/event', event.Id]">
        Voir
      </button>

    </div>
  </div>

  <!-- DATES -->
  <div class="event-dates">
    <span>Début : {{ event.StartAt | date : 'dd/MM/yyyy'}}</span>
    <span>Fin : {{ event.EndAt | date : 'dd/MM/yyyy'}}</span>
  </div>

  <!-- FOOTER -->
  <div class="event-footer">    
    @if (event.NbSubEvent <= 0 ) {
        
    }
    @else {
        <button class="btn toggle-sous-events" (click)="toggle()">
            Course(s) ( {{event.NbSubEvent}})            
        </button>
    }    

    <div class="event-location">      
      <div class="location-sub">{{ event.NbUserSubEvent }} participants</div>
    </div>
    <div class="event-location">      
      <div class="location-sub">{{ event.City }}</div>
    </div>
  </div>

  <!-- Sous events -->
   @if (isOpen) {        
      <app-subevents-list [eventId]="event.Id"></app-subevents-list>              
    } 

</div>
